services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  market-data-service:
    build:
      context: ./services/market-data-service
    environment:
      PORT: 8081
      CSE_API_BASE_URL: https://www.cse.lk/api/
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      DATABASE_URL: postgresql://cse_ai:cse_ai_dev@host.docker.internal:5432/cse_ai
      REDIS_URL: redis://redis:6379
      LOCAL_USER_EMAIL: local@cse.ai
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  technical-analysis-service:
    build:
      context: ./services/technical-analysis-service
    environment:
      PORT: 8091
    ports:
      - "8091:8091"

  ai-prediction-service:
    build:
      context: ./services/ai-prediction-service
    environment:
      PORT: 8092
    ports:
      - "8092:8092"

  backtesting-service:
    build:
      context: ./services/backtesting-service
    environment:
      PORT: 8093
    ports:
      - "8093:8093"

  web:
    build:
      context: ./apps/web
    environment:
      VITE_MARKET_DATA_BASE_URL: http://localhost:8081
      VITE_TECHNICAL_ANALYSIS_BASE_URL: http://localhost:8091
      VITE_AI_PREDICTION_BASE_URL: http://localhost:8092
      VITE_BACKTESTING_BASE_URL: http://localhost:8093
    ports:
      - "${WEB_PORT:-5174}:5173"
    depends_on:
      - market-data-service
      - technical-analysis-service
      - ai-prediction-service
      - backtesting-service
