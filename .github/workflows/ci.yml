name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  web-and-node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install web deps
        working-directory: apps/web
        run: npm ci
      - name: Build web
        working-directory: apps/web
        run: npm run build
      - name: Install market data deps
        working-directory: services/market-data-service
        run: npm ci
      - name: Build market data service
        working-directory: services/market-data-service
        run: npm run build

  python-services:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile Python services
        run: |
          python -m py_compile services/technical-analysis-service/app/main.py
          python -m py_compile services/ai-prediction-service/app/main.py
          python -m py_compile services/ai-prediction-service/app/training_pipeline.py
          python -m py_compile services/backtesting-service/app/engine.py
          python -m py_compile services/backtesting-service/app/main.py
      - name: Run backtesting unit tests
        working-directory: services/backtesting-service
        run: python -m unittest discover -s tests -p "test_*.py"

