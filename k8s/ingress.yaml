apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cse-ai-ingress
  namespace: cse-ai
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
spec:
  ingressClassName: nginx
  rules:
    - host: cse-ai.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: market-data-service
                port:
                  number: 8081
