apiVersion: apps/v1
kind: Deployment
metadata:
  name: technical-analysis-service
  namespace: cse-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: technical-analysis-service
  template:
    metadata:
      labels:
        app: technical-analysis-service
    spec:
      containers:
        - name: technical-analysis-service
          image: ghcr.io/example/cse-ai/technical-analysis-service:latest
          ports:
            - containerPort: 8091
          readinessProbe:
            httpGet:
              path: /health
              port: 8091
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8091
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: technical-analysis-service
  namespace: cse-ai
spec:
  selector:
    app: technical-analysis-service
  ports:
    - port: 8091
      targetPort: 8091
---
