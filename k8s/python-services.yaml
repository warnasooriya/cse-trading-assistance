apiVersion: apps/v1
kind: Deployment
metadata:
  name: technical-analysis-service
  namespace: cse-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: technical-analysis-service
  template:
    metadata:
      labels:
        app: technical-analysis-service
    spec:
      containers:
        - name: technical-analysis-service
          image: ghcr.io/example/cse-ai/technical-analysis-service:latest
          ports:
            - containerPort: 8091
---
apiVersion: v1
kind: Service
metadata:
  name: technical-analysis-service
  namespace: cse-ai
spec:
  selector:
    app: technical-analysis-service
  ports:
    - port: 8091
      targetPort: 8091
---
