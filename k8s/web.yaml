apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: cse-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: ghcr.io/example/cse-ai/web:latest
          ports:
            - containerPort: 5173
          env:
            - name: VITE_MARKET_DATA_BASE_URL
              value: "http://market-data-service:8081"
            - name: VITE_TECHNICAL_ANALYSIS_BASE_URL
              value: "http://technical-analysis-service:8091"
            - name: VITE_AI_PREDICTION_BASE_URL
              value: "http://ai-prediction-service:8092"
            - name: VITE_BACKTESTING_BASE_URL
              value: "http://backtesting-service:8093"
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: cse-ai
spec:
  selector:
    app: web
  ports:
    - port: 80
      targetPort: 5173

