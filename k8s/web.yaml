apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: cse-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: ghcr.io/example/cse-ai/web:latest
          ports:
            - containerPort: 5173
          envFrom:
            - configMapRef:
                name: cse-ai-config
          readinessProbe:
            tcpSocket:
              port: 5173
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 5173
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 400m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: cse-ai
spec:
  selector:
    app: web
  ports:
    - port: 80
      targetPort: 5173
