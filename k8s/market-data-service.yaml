apiVersion: apps/v1
kind: Deployment
metadata:
  name: market-data-service
  namespace: cse-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: market-data-service
  template:
    metadata:
      labels:
        app: market-data-service
    spec:
      containers:
        - name: market-data-service
          image: ghcr.io/example/cse-ai/market-data-service:latest
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: cse-ai-config
            - secretRef:
                name: cse-ai-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 750m
              memory: 768Mi
---
apiVersion: v1
kind: Service
metadata:
  name: market-data-service
  namespace: cse-ai
spec:
  selector:
    app: market-data-service
  ports:
    - name: http
      port: 8081
      targetPort: 8081
