apiVersion: apps/v1
kind: Deployment
metadata:
  name: market-data-service
  namespace: cse-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: market-data-service
  template:
    metadata:
      labels:
        app: market-data-service
    spec:
      containers:
        - name: market-data-service
          image: ghcr.io/example/cse-ai/market-data-service:latest
          ports:
            - containerPort: 8081
          env:
            - name: PORT
              value: "8081"
            - name: CSE_API_BASE_URL
              value: "https://www.cse.lk/api/"
            - name: RABBITMQ_URL
              value: "amqp://guest:guest@rabbitmq:5672"
---
apiVersion: v1
kind: Service
metadata:
  name: market-data-service
  namespace: cse-ai
spec:
  selector:
    app: market-data-service
  ports:
    - name: http
      port: 8081
      targetPort: 8081

